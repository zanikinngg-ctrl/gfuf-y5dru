    <title>Video Gallery</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f0f0f;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }
        /* Video Card Wrapper */
        .video-card {
            position: relative;
            display: block; /* Poora card clickable banane ke liye */
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9; /* Video thumbnail ratio */
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #222;
            cursor: pointer;
        }
        /* Thumbnail Image */
        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease, filter 0.4s ease;
        }
        /* Play Button Overlay */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2); /* Shuru me halka dark blanket */
            transition: background 0.3s ease;
        }
        /* Custom Play Button Design */
        .play-button {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        /* Play Icon Triangle */
        .play-icon {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #111; /* Black play arrow */
            margin-left: 5px; /* Alignment fix */
        }
        /* Hover Effects */
        .video-card:hover .video-thumbnail {
            transform: scale(1.05); /* Image zoom hogi */
            filter: brightness(0.85); /* Image thodi dark hogi */
        }
        .video-card:hover .play-overlay {
            background: rgba(0, 0, 0, 0.4); /* Background zyada dark hoga */
        }
        .video-card:hover .play-button {
            transform: scale(1.15); /* Play button bada hoga */
            background: #ff0000; /* YouTube jaisa red color hover par */
        }
        .video-card:hover .play-icon {
            border-left-color: #fff; /* Arrow white ho jayega */
        }
    </style>
</head>
<body>
